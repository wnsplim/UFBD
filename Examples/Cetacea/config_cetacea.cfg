backbone_tree = cet72.treefile
clade_def     = cetacea.clades
fossils       = cetacea.fossils
hessian       = in.BV

log_output    = output/cetacea
tree_output   = output/cetacea

chain_length    = auto
parallel_chains = 4
coupled_chains  = 1
thinning        = 5000
burn_in         = 0.25
cores           = 32
seed            = 42

max_gen = 100000000
min_ess = 200
rhat    = 1.01

conditioning = origin uniform:53,60
rho          = 1

[lambda]
time_bins = b0:(0,5) | b1:(5,10) | b2:(10,15) | b3:(15,20) | b4:(20,25) | b5:(25,30) | b6:(30,35) | b7:(35,40) | b8:(40,inf)
prior     = exp:10
mode      = hsmrf

[mu]
time_bins = b0:(0,5) | b1:(5,10) | b2:(10,15) | b3:(15,20) | b4:(20,25) | b5:(25,30) | b6:(30,35) | b7:(35,40) | b8:(40,inf)
prior     = exp:10
mode      = hsmrf

[psi]
time_bins = b0:(0,5) | b1:(5,10) | b2:(10,15) | b3:(15,20) | b4:(20,25) | b5:(25,30) | b6:(30,35) | b7:(35,40) | b8:(40,inf)
prior     = exp:10
mode      = hsmrf

[clock]
clock_model  = ucln
rgene_gamma  = 2,20,1
sigma2_gamma = 1,10,1
sigma2_param = pncp
pncp_tuning  = 50000
