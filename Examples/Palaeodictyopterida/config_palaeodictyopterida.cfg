# Core input
fossils       = palaeodictyopterida.fossils

# Output
log_output    = output/palaeodictyopterida
tree_output   = output/palaeodictyopterida

# MCMC settings
chain_length    = auto
parallel_chains = 4
coupled_chains  = 4
thinning        = 20000
burn_in         = 0.25
cores           = 16
seed            = 42

# Convergence
max_gen = 500000000
min_ess = 400
rhat    = 1.01

# FBD model
conditioning = extinct exp:0.1,327
rho          = 1

[lambda]
time_bins = b0:(250,260) | b1:(260,270) | b2:(270,280) | b3:(280,290) | b4:(290,300) | b5:(300,310) | b6:(310,inf)
mode      = ou

[mu]
time_bins = b0:(250,260) | b1:(260,270) | b2:(270,280) | b3:(280,290) | b4:(290,300) | b5:(300,310) | b6:(310,inf)
mode      = ou

[psi]
time_bins = b0:(250,273.0) | b1:(273.0,283.3) | b2:(283.3,298.9) | b3:(298.9,303.7) | b4:(303.7,315.2) | b5:(315.2,inf)
prior     = exp:10
mode      = indep
